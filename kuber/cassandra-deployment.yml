apiVersion: apps/v1
kind: Deployment

metadata:
  name: cassandra
  namespace: telemetry

spec:
  replicas: 1

  selector:
    matchLabels:
      app: cassandra

  template:
    metadata:
      labels:
        app: cassandra

    spec:
      containers:
      - name: cassandra
        image: cassandra:4.1

        ports:
        - containerPort: 9042

        env:
        - name: CASSANDRA_CLUSTER_NAME
          value: telemetry-cluster