name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd app
          pip install -r requirements.txt
      

      - name: Run tests
        run: |
          cd app
          pytest tests/
 


  build-and-push:

    needs: test

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build consumer image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/telemetry-consumer:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/telemetry-consumer:${{ github.sha }} \
             ./consumer

      - name: Push consumer image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/telemetry-consumer:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/telemetry-consumer:${{ github.sha }}

      - name: Build simulation image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/telemetry-simulation:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/telemetry-simulation:${{ github.sha }} \
             ./simulation

      - name: Push simulation image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/telemetry-simulation:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/telemetry-simulation:${{ github.sha }} 

      - name: Build app image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/telemetry-api:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/telemetry-api:${{ github.sha }} \
            ./app

      - name: Push app image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/telemetry-api:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/telemetry-api:${{ github.sha }}  

      - name: Validate compose
        run: docker compose config  