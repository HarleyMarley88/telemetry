services:

  

  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    ports:
      - "9042:9042"
    environment:
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 128M
    volumes:
      - cassandra_data:/var/lib/cassandra

  cassandra-init:
    image: cassandra:4.1
    depends_on:
      - cassandra
    volumes:
      - ./init/cassandra.cql:/schema.cql
    entrypoint: ["sh", "-c"]
    command: >
      "cqlsh cassandra -f /schema.cql"

  kafka:
    image: apache/kafka:latest
    container_name: kafka

    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_CLUSTER_ID: 5L6g3nShT-eMCtK--X86sw

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

  loki:
    image: grafana/loki:latest
    container_name: loki

    ports:
      - "3100:3100"

    command: -config.file=/etc/loki/local-config.yaml

  grafana:
    image: grafana/grafana:latest
    container_name: grafana

    ports:
      - "3000:3000"

    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin

    volumes:
      - grafana-storage:/var/lib/grafana  

    depends_on:
      - loki

  promtail:
    image: grafana/promtail:latest
    container_name: promtail

    volumes:
      - ./observability/promtail-config.yml:/etc/promtail/config.yml
      - ./logs:/logs

    command: -config.file=/etc/promtail/config.yml

    depends_on:
      - loki

  db:
    image: postgres:16

    environment:
      POSTGRES_DB: testdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data
  
  prometheus:
    image: prom/prometheus
    container_name: prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml

  app:
    image: harleymarley88/telemetry-api:latest
    container_name: telemetry-api
    depends_on:
      - kafka
      - cassandra
    environment:
      KAFKA_HOST: kafka:9092
      CASSANDRA_HOST: cassandra
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/logs  

  consumer:
    image: harleymarley88/telemetry-consumer:latest
    container_name: kafka-consumer
    depends_on:
      - kafka
      - cassandra
    environment:
      KAFKA_HOST: kafka:9092
      CASSANDRA_HOST: cassandra
    volumes:
      - ./logs:/logs 
    ports:
      - "8001:8001"   

  simulation:
    image: harleymarley88/telemetry-simulation:latest
    container_name: kafka-simulation
    depends_on:
      - kafka
    environment:
      KAFKA_HOST: kafka:9092
    ports:
      - "8002:8002"   
    volumes:
      - ./logs:/logs  
volumes:
  cassandra_data:
  pgdata:
  grafana-storage:      